<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SENDER | QR-конструктор</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs2@0.0.2/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            font-family: 'Inter', sans-serif;
            padding: 48px 24px;
            color: #111111;
        }

        .app {
            max-width: 1280px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 56px;
        }

        .header h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 4rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #000000;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 0.9rem;
            font-weight: 400;
            color: #666666;
            letter-spacing: 0.3px;
        }

        .grid {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
        }

        .controls {
            flex: 1.2;
            min-width: 280px;
            background: #ffffff;
            border: 1px solid #eaeef2;
            border-radius: 24px;
            padding: 32px;
            transition: all 0.2s ease;
        }

        .preview {
            flex: 1;
            min-width: 340px;
            background: #ffffff;
            border: 1px solid #eaeef2;
            border-radius: 24px;
            padding: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .section-title {
            font-family: 'Oswald', sans-serif;
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #888888;
            margin-bottom: 20px;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 8px;
        }

        .input-group {
            margin-bottom: 28px;
        }

        label {
            display: block;
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #999999;
            margin-bottom: 10px;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #e2e6ea;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            background: #ffffff;
            transition: all 0.2s;
            color: #111111;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #000000;
            box-shadow: 0 0 0 2px rgba(0,0,0,0.03);
        }

        textarea {
            min-height: 85px;
            resize: vertical;
        }

        .row-two {
            display: flex;
            gap: 16px;
        }

        .row-two > div {
            flex: 1;
        }

        .btn {
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            font-family: 'Oswald', sans-serif;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #000000;
            color: white;
        }

        .btn-primary {
            background: #000000;
            width: 100%;
            padding: 14px;
            font-size: 0.85rem;
            margin-top: 8px;
        }

        .btn-primary:hover {
            background: #2a2a2a;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #111111;
            border: 1px solid #e2e6ea;
            margin-top: 12px;
        }

        .btn-secondary:hover {
            background: #ebebeb;
        }

        .qr-stage {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .qr-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
        }

        .logo-zone {
            width: 100%;
            background: #fafafc;
            border-radius: 20px;
            padding: 20px;
            margin: 16px 0 8px;
            border: 1px solid #efefef;
        }

        .logo-preview {
            margin-top: 16px;
            display: flex;
            justify-content: center;
        }

        .logo-preview img {
            width: 56px;
            height: 56px;
            object-fit: cover;
            border-radius: 14px;
            border: 1px solid #eaeef2;
            background: white;
        }

        .flex-btns {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .effect-badge {
            font-size: 0.7rem;
            background: #f5f5f5;
            padding: 6px 14px;
            border-radius: 40px;
            color: #444;
            margin-top: 16px;
        }

        hr {
            margin: 24px 0;
            border: none;
            height: 1px;
            background: #f0f0f0;
        }

        .footer {
            text-align: center;
            margin-top: 56px;
            font-size: 0.7rem;
            color: #aaa;
            font-family: 'Inter', sans-serif;
        }

        @media (max-width: 860px) {
            body { padding: 24px 16px; }
            .controls, .preview { padding: 24px; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>SENDER</h1>
        <p>генерация · дизайн · фото по центру</p>
    </div>

    <div class="grid">
        <div class="controls">
            <div class="section-title">параметры кода</div>

            <div class="input-group">
                <label>данные для qr</label>
                <textarea id="qrData" placeholder="ссылка, текст, номер посылки...">https://sender.track/parcel/demo-001</textarea>
            </div>

            <div class="row-two">
                <div class="input-group">
                    <label>размер (px)</label>
                    <input type="number" id="qrSize" value="240" min="120" max="450" step="10">
                </div>
                <div class="input-group">
                    <label>цвет кода</label>
                    <input type="color" id="qrColor" value="#000000">
                </div>
            </div>

            <div class="row-two">
                <div class="input-group">
                    <label>фон кода</label>
                    <input type="color" id="qrBg" value="#ffffff">
                </div>
                <div class="input-group">
                    <label>скругление (px)</label>
                    <input type="number" id="cornerRadius" value="20" min="0" max="50" step="2">
                </div>
            </div>

            <div class="input-group">
                <label>эффект дизайна</label>
                <select id="designEffect">
                    <option value="none">минимализм</option>
                    <option value="soft">мягкая тень</option>
                    <option value="thin">тонкая рамка</option>
                    <option value="airy">воздушное свечение</option>
                </select>
            </div>

            <div class="logo-zone">
                <label>центральное изображение</label>
                <div class="flex-btns">
                    <input type="file" id="logoUpload" accept="image/png, image/jpeg, image/jpg, image/webp" style="flex:1">
                    <button type="button" id="clearLogo" class="btn btn-secondary" style="padding: 10px 18px;">сброс</button>
                </div>
                <div id="logoPreview" class="logo-preview"></div>
            </div>

            <button id="generateBtn" class="btn btn-primary">обновить qr</button>
            <button id="exportBtn" class="btn btn-secondary">экспорт png</button>
        </div>

        <div class="preview">
            <div class="section-title">предпросмотр</div>
            <div class="qr-stage">
                <div id="qrDisplay" style="display: flex; justify-content: center; align-items: center;"></div>
                <div id="effectLabel" class="effect-badge">минимализм</div>
            </div>
        </div>
    </div>
    <div class="footer">SENDER · полностью настраиваемый QR-код с логотипом в центре</div>
</div>

<script>
(function() {
    const qrDataField = document.getElementById('qrData');
    const qrSizeInput = document.getElementById('qrSize');
    const qrColorInput = document.getElementById('qrColor');
    const qrBgInput = document.getElementById('qrBg');
    const radiusInput = document.getElementById('cornerRadius');
    const effectSelect = document.getElementById('designEffect');
    const logoUpload = document.getElementById('logoUpload');
    const clearLogoBtn = document.getElementById('clearLogo');
    const generateBtn = document.getElementById('generateBtn');
    const exportBtn = document.getElementById('exportBtn');
    const qrDisplay = document.getElementById('qrDisplay');
    const effectLabel = document.getElementById('effectLabel');
    const logoPreview = document.getElementById('logoPreview');

    let currentQRInstance = null;
    let currentLogoURL = null;
    let currentCanvas = null;

    function getEffectName(value) {
        const map = {
            'none': 'минимализм',
            'soft': 'мягкая тень',
            'thin': 'тонкая рамка',
            'airy': 'воздушное свечение'
        };
        return map[value] || 'минимализм';
    }

    function generatePureQR(callback) {
        const text = qrDataField.value.trim();
        if (!text) {
            alert('введите данные для QR-кода');
            return false;
        }
        const size = parseInt(qrSizeInput.value, 10);
        const dark = qrColorInput.value;
        const light = qrBgInput.value;

        qrDisplay.innerHTML = '';
        const tempDiv = document.createElement('div');
        tempDiv.id = 'temp_qr_holder';
        qrDisplay.appendChild(tempDiv);

        try {
            if (currentQRInstance) {
                if (currentQRInstance._el && currentQRInstance._el.parentNode) {
                    currentQRInstance.clear();
                }
            }
            const qr = new QRCode(tempDiv, {
                text: text,
                width: size,
                height: size,
                colorDark: dark,
                colorLight: light,
                correctLevel: QRCode.CorrectLevel.H
            });
            currentQRInstance = qr;
            setTimeout(() => {
                const qrImg = tempDiv.querySelector('img');
                const qrCanvas = tempDiv.querySelector('canvas');
                let source = qrCanvas || qrImg;
                if (source) {
                    callback(source, size);
                } else {
                    callback(null, size);
                }
            }, 40);
            return true;
        } catch(e) {
            alert('ошибка генерации');
            return false;
        }
    }

    async function applyFullDesign(sourceElement, qrSize) {
        let sourceCanvas = null;
        if (sourceElement.tagName === 'IMG') {
            sourceCanvas = document.createElement('canvas');
            sourceCanvas.width = qrSize;
            sourceCanvas.height = qrSize;
            const ctx = sourceCanvas.getContext('2d');
            ctx.drawImage(sourceElement, 0, 0, qrSize, qrSize);
        } else if (sourceElement.tagName === 'CANVAS') {
            sourceCanvas = sourceElement;
        } else {
            return;
        }

        const effect = effectSelect.value;
        const radius = parseInt(radiusInput.value, 10);

        const finalCanvas = document.createElement('canvas');
        finalCanvas.width = qrSize;
        finalCanvas.height = qrSize;
        const ctx = finalCanvas.getContext('2d');

        ctx.drawImage(sourceCanvas, 0, 0, qrSize, qrSize);

        if (effect === 'soft') {
            ctx.shadowColor = 'rgba(0,0,0,0.08)';
            ctx.shadowBlur = 14;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 4;
            ctx.drawImage(sourceCanvas, 0, 0, qrSize, qrSize);
            ctx.shadowColor = 'transparent';
        } else if (effect === 'thin') {
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(2, 2, qrSize - 4, qrSize - 4);
        } else if (effect === 'airy') {
            ctx.shadowColor = '#d4d4d4';
            ctx.shadowBlur = 18;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
            ctx.drawImage(sourceCanvas, 0, 0, qrSize, qrSize);
            ctx.shadowColor = 'transparent';
            ctx.globalCompositeOperation = 'source-over';
        }

        const roundedCanvas = document.createElement('canvas');
        roundedCanvas.width = qrSize;
        roundedCanvas.height = qrSize;
        const roundCtx = roundedCanvas.getContext('2d');
        roundCtx.beginPath();
        const r = Math.min(radius, qrSize / 2);
        roundCtx.moveTo(r, 0);
        roundCtx.lineTo(qrSize - r, 0);
        roundCtx.quadraticCurveTo(qrSize, 0, qrSize, r);
        roundCtx.lineTo(qrSize, qrSize - r);
        roundCtx.quadraticCurveTo(qrSize, qrSize, qrSize - r, qrSize);
        roundCtx.lineTo(r, qrSize);
        roundCtx.quadraticCurveTo(0, qrSize, 0, qrSize - r);
        roundCtx.lineTo(0, r);
        roundCtx.quadraticCurveTo(0, 0, r, 0);
        roundCtx.closePath();
        roundCtx.clip();
        roundCtx.drawImage(finalCanvas, 0, 0, qrSize, qrSize);

        qrDisplay.innerHTML = '';
        const wrapper = document.createElement('div');
        wrapper.style.display = 'flex';
        wrapper.style.justifyContent = 'center';
        wrapper.style.alignItems = 'center';
        wrapper.style.borderRadius = `${radius}px`;
        wrapper.style.overflow = 'hidden';

        if (effect === 'soft') {
            wrapper.style.boxShadow = '0 12px 28px -8px rgba(0,0,0,0.1)';
        } else if (effect === 'airy') {
            wrapper.style.boxShadow = '0 0 0 1px #f0f0f0, 0 10px 25px -5px rgba(0,0,0,0.03)';
        } else if (effect === 'thin') {
            wrapper.style.boxShadow = '0 0 0 1px #eaeef2';
        } else {
            wrapper.style.boxShadow = 'none';
        }

        roundedCanvas.style.display = 'block';
        roundedCanvas.style.borderRadius = `${radius}px`;
        wrapper.appendChild(roundedCanvas);
        qrDisplay.appendChild(wrapper);

        currentCanvas = roundedCanvas;

        if (currentLogoURL) {
            await overlayLogo(roundedCanvas, qrSize);
        }

        const effectText = getEffectName(effect);
        effectLabel.innerText = `${effectText} · радиус ${radius}px`;
    }

    async function overlayLogo(canvasElement, qrSize) {
        if (!currentLogoURL) return;
        const img = new Image();
        const promise = new Promise((resolve) => {
            img.onload = () => {
                const ctx = canvasElement.getContext('2d');
                const maxLogo = qrSize * 0.27;
                let w = img.width;
                let h = img.height;
                const ratio = w / h;
                let drawW = maxLogo;
                let drawH = drawW / ratio;
                if (drawH > maxLogo) {
                    drawH = maxLogo;
                    drawW = drawH * ratio;
                }
                const x = (qrSize - drawW) / 2;
                const y = (qrSize - drawH) / 2;

                ctx.save();
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(x + drawW/2, y + drawH/2, Math.max(drawW, drawH)/1.85, 0, 2 * Math.PI);
                ctx.fillStyle = "#FFFFFF";
                ctx.fill();
                ctx.shadowColor = "rgba(0,0,0,0.05)";
                ctx.shadowBlur = 6;
                ctx.drawImage(img, x, y, drawW, drawH);
                ctx.restore();
                resolve();
            };
            img.onerror = () => resolve();
            img.src = currentLogoURL;
        });
        await promise;
    }

    function refreshQR() {
        if (currentQRInstance) {
            const holder = document.getElementById('temp_qr_holder');
            if (holder) holder.innerHTML = '';
            currentQRInstance = null;
        }
        generatePureQR((source, size) => {
            if (source) {
                applyFullDesign(source, size);
            }
        });
    }

    function handleLogoUpload(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            currentLogoURL = e.target.result;
            logoPreview.innerHTML = `<img src="${currentLogoURL}" alt="лого">`;
            if (currentCanvas && qrDisplay.contains(currentCanvas.parentNode)) {
                const curSize = parseInt(qrSizeInput.value, 10);
                overlayLogo(currentCanvas, curSize);
            } else {
                refreshQR();
            }
        };
        reader.readAsDataURL(file);
    }

    logoUpload.addEventListener('change', (e) => {
        if (e.target.files && e.target.files[0]) {
            handleLogoUpload(e.target.files[0]);
        }
    });

    clearLogoBtn.addEventListener('click', () => {
        currentLogoURL = null;
        logoPreview.innerHTML = '';
        logoUpload.value = '';
        refreshQR();
    });

    generateBtn.addEventListener('click', () => {
        refreshQR();
    });

    exportBtn.addEventListener('click', async () => {
        if (!currentCanvas) {
            alert('сначала создайте QR-код');
            return;
        }
        let exportCanvas = currentCanvas;
        if (!exportCanvas) {
            const foundCanvas = qrDisplay.querySelector('canvas');
            if (foundCanvas) exportCanvas = foundCanvas;
        }
        if (exportCanvas) {
            const link = document.createElement('a');
            link.download = 'sender_qr.png';
            link.href = exportCanvas.toDataURL('image/png');
            link.click();
        } else {
            alert('не удалось экспортировать');
        }
    });

    const autoFields = [qrSizeInput, qrColorInput, qrBgInput, radiusInput, effectSelect];
    autoFields.forEach(field => {
        field.addEventListener('change', () => refreshQR());
        if (field.type !== 'color') field.addEventListener('input', () => refreshQR());
    });

    refreshQR();
})();
</script>
</body>
</html>
